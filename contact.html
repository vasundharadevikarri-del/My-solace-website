<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <style>
    body { 
      font-family: "Times New Roman", serif; 
      text-align: center; 
     background-image: url("petals.jpeg"); /* or "imag/petals.jpeg" if inside folder */
    
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
      color: #2c3e50;
    }

    nav a { 
      margin: 0 15px; 
      text-decoration: none; 
      color: #fff; 
      background: #34495e; 
      padding: 8px 12px; 
      border-radius: 5px; 
      font-weight: bold;
    }

    form { 
      margin-top: 20px; 
      background-color: rgba(255,255,255,0.8); 
      display: inline-block;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    input { 
      margin: 10px; 
      padding: 10px; 
      width: 280px; 
      border-radius: 8px; 
      border: 1px solid #ccc; 
    }

    textarea { 
      margin: 10px; 
      padding: 10px; 
      width: 250px;   /* wider */
      height: 250px;  /* taller */
      border-radius: 8px; 
      border: 1px solid #ccc; 
      resize: vertical; /* allows user to adjust height */
    }

    button { 
      padding: 10px 20px; 
      background: #2980b9;  
      color: white; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
    }

    h1 { 
      color: #1a237e; 
      font-size: 36px; 
      text-shadow: 2px 2px #fff; 
      background-color: rgba(255,255,255,0.7); 
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
    }
  </style>
</head>
